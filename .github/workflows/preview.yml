name: Deploy (preview)

# PR ごとのプレビューデプロイ（docs/13 §1）。fork からの PR は Secrets にアクセスできないため実行しない。
# 実行には CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID の Repository Secrets が必要。

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  preview:
    name: Build and deploy preview
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (OpenNext Cloudflare)
        working-directory: apps/web
        run: pnpm exec opennextjs-cloudflare build

      - name: Deploy preview version
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: versions upload --env preview

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.deploy.outputs.command-output }}`;
            const match = output.match(/https:\/\/\S+\.workers\.dev\S*/);
            const url = match ? match[0] : '(URLを取得できませんでした。Actionsログを確認してください)';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔍 プレビューデプロイ: ${url}`,
            });
